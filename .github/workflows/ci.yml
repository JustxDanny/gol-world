name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18 cppcheck libncurses-dev valgrind

      - name: Run all checks (capture report)
        run: |
          set +e
          R=ci-report.txt
          : > "$R"
          fail=0
          echo "== clang-format --dry-run --Werror ==" >> "$R"
          clang-format-18 --dry-run --Werror src/game_of_life.c >> "$R" 2>&1 || fail=1
          echo "== cppcheck ==" >> "$R"
          cppcheck --enable=all --inline-suppr --check-level=exhaustive \
            --suppress=missingIncludeSystem --suppress=checkersReport \
            --template='{severity}|{id}|{file}:{line}|{message}' \
            src/game_of_life.c >> "$R" 2>&1
          grep -Eq '^(error|warning|style|performance|portability)\|' "$R" && fail=1
          echo "== build (gcc -std=c11 -Wall -Wextra -Werror) ==" >> "$R"
          make -C src >> "$R" 2>&1 || fail=1
          echo "== valgrind (--frames 200 < gosper_gun) ==" >> "$R"
          valgrind --leak-check=full --error-exitcode=1 \
            ./src/game_of_life --frames 200 < seeds/gosper_gun.txt >> "$R" 2>&1 || fail=1
          echo "== invariants ==" >> "$R"
          for spec in block.txt:4 glider.txt:5 blinker_toad.txt:9; do
            f="${spec%:*}"; e="${spec#*:}"
            o=$(./src/game_of_life --frames 200 < "seeds/$f")
            echo "$f -> [$o]  want [frames=200 population=$e]" >> "$R"
            [ "$o" != "frames=200 population=$e" ] && fail=1
          done
          echo "OVERALL=$([ $fail -eq 0 ] && echo PASS || echo FAIL)" >> "$R"
          echo "===== REPORT ====="
          cat "$R"
          exit 0

      - name: Publish diagnostic report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f ci-report.txt
          git commit -m "ci: diagnostic report" || true
          git push origin HEAD:${{ github.ref_name }} || true

      - name: Verdict
        if: always()
        run: grep -q "OVERALL=PASS" ci-report.txt
